services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - taskflow_mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_SERVER: db
      DB_NAME: TaskFlow
      DB_TRUSTED_CONNECTION: "false"
      DB_USER: sa
      DB_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
    depends_on:
      db:
        condition: service_healthy

volumes:
  taskflow_mssql_data:
